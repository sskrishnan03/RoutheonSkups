<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Plan a Trip - Style Selection | RoutheonSkups</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6",
                        "primary-hover": "#2563EB",
                        "background-light": "#FFFFFF",
                        "background-dark": "#0F172A",
                        "surface-light": "#F8FAFC",
                        "surface-dark": "#1E293B",
                        "text-main-light": "#1E293B",
                        "text-main-dark": "#F1F5F9",
                        "text-muted-light": "#64748B",
                        "text-muted-dark": "#94A3B8",
                        "border-light": "#E2E8F0",
                        "border-dark": "#334155",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                        body: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        xl: "1rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                    },
                    boxShadow: {
                        soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        hover: "0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.01)",
                        glass: "0 8px 32px 0 rgba(31, 38, 135, 0.15)",
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            html { scroll-behavior: smooth; }
            body { @apply font-body bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark transition-colors duration-300; }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        .category-card.selected {
            @apply border-primary ring-2 ring-primary/20 bg-blue-50/40 dark:bg-blue-900/10;
        }

        .category-card.selected .check-mark {
            @apply opacity-100 scale-100;
        }
    </style>
</head>

<body>
    {% include 'components/navbar.html' %}
    <main class="min-h-screen relative pt-40 pb-24 overflow-hidden">
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div
                class="absolute top-0 right-0 w-[50%] h-[50%] bg-blue-50/50 dark:bg-blue-900/5 blur-[120px] rounded-full">
            </div>
            <div
                class="absolute bottom-0 left-0 w-[40%] h-[40%] bg-cyan-50/50 dark:bg-cyan-900/5 blur-[120px] rounded-full">
            </div>
        </div>

        <div class="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col items-center mb-12">
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex items-center gap-2">
                        <div
                            class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold">
                            1</div>
                        <span class="text-xs font-bold text-text-muted-light hidden sm:inline">Destination</span>
                    </div>
                    <div class="w-8 h-px bg-border-light"></div>
                    <div class="flex items-center gap-2">
                        <div
                            class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold">
                            2</div>
                        <span class="text-xs font-bold text-text-muted-light hidden sm:inline">Dates</span>
                    </div>
                    <div class="w-8 h-px bg-border-light"></div>
                    <div class="flex items-center gap-2">
                        <div
                            class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold shadow-lg shadow-primary/30 ring-4 ring-primary/20">
                            3</div>
                        <span class="text-sm font-bold text-text-main-light dark:text-white">Style</span>
                    </div>
                    <div class="w-8 h-px bg-border-light"></div>
                    <div class="flex items-center gap-2">
                        <div
                            class="w-8 h-8 rounded-full bg-surface-light dark:bg-surface-dark text-text-muted-light border border-border-light dark:border-border-dark flex items-center justify-center text-xs font-bold">
                            4</div>
                        <span class="text-xs font-bold text-text-muted-light hidden sm:inline">Review</span>
                    </div>
                </div>

                <h1
                    class="text-4xl md:text-5xl font-extrabold text-text-main-light dark:text-white text-center tracking-tight mb-4">
                    What is your travel style?
                </h1>
                <p class="text-text-muted-light dark:text-text-muted-dark text-center text-lg max-w-2xl">
                    Choose one or more categories to personalize your itinerary.
                </p>
            </div>

            <div id="category-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-5 mb-6"></div>

            <div class="flex items-center justify-center mb-16 gap-3 flex-wrap">
                <button id="more-options-btn"
                    class="px-10 py-3 bg-white dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-full font-bold text-text-main-light dark:text-white hover:shadow-md transition-all">
                    More Options
                </button>
                <button id="go-first-btn"
                    class="px-8 py-3 bg-white dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-full font-bold text-text-main-light dark:text-white hover:shadow-md transition-all">
                    Go To First
                </button>
                <span id="page-indicator" class="text-sm font-semibold text-text-muted-light dark:text-text-muted-dark"></span>
            </div>

            <div
                class="flex flex-col sm:flex-row items-center justify-between gap-4 pt-8 border-t border-border-light dark:border-border-dark">
                <button onclick="history.back()"
                    class="w-full sm:w-auto px-8 py-4 bg-white dark:bg-surface-dark border border-border-light dark:border-border-dark text-text-main-light dark:text-white rounded-xl font-bold shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                    <span class="material-icons-round text-lg">arrow_back</span>
                    Back
                </button>
                <div id="selection-count"
                    class="text-sm font-bold text-text-muted-light bg-surface-light dark:bg-white/5 px-4 py-2 rounded-full">
                    0 Categories Selected
                </div>
                <button id="next-step-btn"
                    class="w-full sm:w-auto px-12 py-4 bg-primary hover:bg-primary-hover text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 group">
                    Next Step
                    <span
                        class="material-icons-round text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-background-dark pt-16 pb-8 border-t border-border-light dark:border-border-dark">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-xs text-text-muted-light dark:text-text-muted-dark">
                © 2026 RoutheonSkups. All rights reserved.
            </p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const categoryGrid = document.getElementById('category-grid');
            const selectionCountEl = document.getElementById('selection-count');
            const nextBtn = document.getElementById('next-step-btn');
            const moreOptionsBtn = document.getElementById('more-options-btn');
            const goFirstBtn = document.getElementById('go-first-btn');
            const pageIndicator = document.getElementById('page-indicator');

            const categories = [
                { name: 'City', icon: '🏙️' },
                { name: 'Town', icon: '🏘️' },
                { name: 'Village', icon: '🏡' },
                { name: 'Beach', icon: '🏖️' },
                { name: 'Island', icon: '🏝️' },
                { name: 'Hill', icon: '⛰️' },
                { name: 'Mountain', icon: '⛰️' },
                { name: 'Valley', icon: '🌄' },
                { name: 'Lake', icon: '💧' },
                { name: 'River', icon: '🏞️' },
                { name: 'Ghat', icon: '🪜' },
                { name: 'Forest', icon: '🌲' },
                { name: 'Wildlife', icon: '🐾' },
                { name: 'Park', icon: '🌳' },
                { name: 'Garden', icon: '🌸' },
                { name: 'Fort', icon: '🏰' },
                { name: 'Palace', icon: '🏯' },
                { name: 'Monument', icon: '🏛️' },
                { name: 'Heritage', icon: '🏢' },
                { name: 'Temple', icon: '🛕' },
                { name: 'Church', icon: '⛪' },
                { name: 'Mosque', icon: '🕌' },
                { name: 'Gurudwara', icon: '⭐' },
                { name: 'Monastery', icon: '🏮' },
                { name: 'Museum', icon: '🏛️' },
                { name: 'Archaeology', icon: '🗿' },
                { name: 'Sanctuary', icon: '🛫' },
                { name: 'National Park', icon: '🌳' },
                { name: 'Adventure', icon: '🪂' },
                { name: 'Trek', icon: '🥾' },
                { name: 'Viewpoint', icon: '📷' },
                { name: 'Waterfall', icon: '🌊' },
                { name: 'Market', icon: '🏪' },
                { name: 'Food', icon: '🍽️' },
                { name: 'Culture', icon: '🎭' },
                { name: 'Festival', icon: '🎉' },
                { name: 'Transport', icon: '🚌' },
                { name: 'Harbour', icon: '⚓' },
                { name: 'Resort', icon: '🏊' },
                { name: 'Homestay', icon: '🏠' },
                { name: 'Experience', icon: '💡' },
                { name: 'Activity', icon: '🏃' }
            ];

            const pageSize = 10;
            let visibleCount = pageSize;
            const selectedCategories = new Set();

            const urlParams = new URLSearchParams(window.location.search);
            const existingStyles = urlParams.get('styles');
            if (existingStyles) {
                existingStyles.split(',').map(s => s.trim()).filter(Boolean).forEach(s => selectedCategories.add(s));
            }

            function updateSelectionCount() {
                const selectedCount = selectedCategories.size;
                if (selectedCount === 1) {
                    selectionCountEl.innerText = '1 Category Selected';
                } else {
                    selectionCountEl.innerText = `${selectedCount} Categories Selected`;
                }
            }

            function renderCategories() {
                const visibleItems = categories.slice(0, visibleCount);

                categoryGrid.innerHTML = visibleItems.map((item) => {
                    const isSelected = selectedCategories.has(item.name);
                    return `
                        <button type="button" data-category="${item.name}"
                            class="category-card ${isSelected ? 'selected' : ''} group relative bg-white dark:bg-surface-dark p-6 rounded-3xl border border-border-light dark:border-border-dark text-center cursor-pointer hover:shadow-hover transition-all duration-300 min-h-[150px]">
                            <div class="absolute top-3 right-3 check-mark opacity-0 scale-50 transition-all duration-300">
                                <div class="w-5 h-5 bg-primary rounded-full flex items-center justify-center shadow-md">
                                    <span class="material-icons-round text-white text-[11px]">check</span>
                                </div>
                            </div>
                            <div class="w-11 h-11 mx-auto mb-4 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center">
                                <span class="text-[22px] leading-none">${item.icon}</span>
                            </div>
                            <h3 class="text-lg font-bold text-text-main-light dark:text-white leading-tight">${item.name}</h3>
                        </button>
                    `;
                }).join('');

                pageIndicator.innerText = `Showing ${Math.min(visibleCount, categories.length)} of ${categories.length}`;
                moreOptionsBtn.disabled = visibleCount >= categories.length;
                moreOptionsBtn.classList.toggle('opacity-50', moreOptionsBtn.disabled);
                moreOptionsBtn.classList.toggle('cursor-not-allowed', moreOptionsBtn.disabled);
            }

            categoryGrid.addEventListener('click', (e) => {
                const card = e.target.closest('[data-category]');
                if (!card) return;

                const name = card.getAttribute('data-category');
                if (selectedCategories.has(name)) {
                    selectedCategories.delete(name);
                } else {
                    selectedCategories.add(name);
                }

                renderCategories();
                updateSelectionCount();
            });

            moreOptionsBtn.addEventListener('click', () => {
                const previousCount = visibleCount;
                visibleCount = Math.min(visibleCount + pageSize, categories.length);
                renderCategories();
                if (visibleCount > previousCount) {
                    setTimeout(() => {
                        window.scrollBy({ top: 280, behavior: 'smooth' });
                    }, 50);
                }
            });

            goFirstBtn.addEventListener('click', () => {
                visibleCount = pageSize;
                renderCategories();
                categoryGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            nextBtn.addEventListener('click', () => {
                if (selectedCategories.size === 0) {
                    alert('Please select at least one category to continue.');
                    return;
                }

                urlParams.set('styles', Array.from(selectedCategories).join(','));
                window.location.href = "{{ url_for('main.plan_trip_step3') }}?" + urlParams.toString();
            });

            updateSelectionCount();
            renderCategories();
        });
    </script>
</body>

</html>
